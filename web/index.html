<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Pagos - CECI F.C.</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-800">CECI F.C.</h1>
            <p class="text-gray-500 text-sm">Plataforma Segura de Pagos Team Master</p>
        </div>

        <form id="pagoForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">ID del Acudiente</label>
                <input type="text" id="idAcudiente" required placeholder="Ej: ACU_009" 
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Monto a Pagar (COP)</label>
                <input type="number" id="monto" required min="1" placeholder="Ej: 150000" 
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Concepto</label>
                <select id="concepto" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    <option value="MENSUALIDAD">Mensualidad</option>
                    <option value="UNIFORMES">Uniformes y Dotación</option>
                    <option value="TORNEO">Inscripción a Torneo</option>
                </select>
            </div>

            <button type="submit" id="btnPagar" 
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                Procesar Pago
            </button>
        </form>

        <div id="resultado" class="mt-6 hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
